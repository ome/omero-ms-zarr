repos:
- repo: https://github.com/psf/black-pre-commit-mirror
  rev: 26.3.1
  hooks:
  - id: black
    # default black line length is 88
    args: [--target-version=py35, --line-length=79]
- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
    # default flake8 line length is 79
